<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF4B0"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="75%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#8C6B00"/>
    </linearGradient>

    <!-- Edge shading -->
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B89600"/>
      <stop offset="100%" stop-color="#5C4700"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <path id="key-base"
        d="M64 120 Q64 64 120 64 H392 Q448 64 448 120 V392 Q448 448 392 448 H120 Q64 448 64 392 Z"
        fill="url(#goldEdge)"/>

  <!-- Top face -->
  <path id="key-top"
        d="M96 140 Q96 96 140 96 H372 Q416 96 416 140 V372 Q416 416 372 416 H140 Q96 416 96 372 Z"
        fill="url(#goldGradient)"/>

  <!-- Inner highlight border -->
  <path
        d="M110 150 Q110 110 150 110 H362 Q402 110 402 150 V362 Q402 402 362 402 H150 Q110 402 110 362 Z"
        fill="none"
        stroke="#FFF8DC"
        stroke-width="6"
        opacity="0.5"/>

  <!-- Poké Ball icon (scaled down) -->
  <g id="poke-icon" transform="translate(185,260) scale(0.6)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#3E2723" stroke-width="10"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#3E2723" stroke-width="10"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#3E2723" stroke-width="10"/>
  </g>

  <!-- Large engraved "1" (inside + slightly left) -->
  <path id="rank-number"
        d="M300 150 
           L350 130 
           V360 
           H310 
           V180 
           L280 195 
           Z"
        fill="#3E2723"
        opacity="0.95"/>

</svg>